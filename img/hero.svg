<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Placeholder immagine hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E6F2FB"/>
      <stop offset="100%" stop-color="#0A84D6"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Big water drop -->
  <g transform="translate(400 290)">
    <path d="M0 -180 C 100 -40 150 30 150 80 a 150 150 0 1 1 -300 0 C -150 30 -100 -40 0 -180 z" fill="#ffffff" opacity="0.95"/>
    <path d="M -55 70 a 55 55 0 0 0 55 55" stroke="#0A84D6" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wrench -->
  <g transform="translate(560 420) rotate(25)" fill="#0663A3" opacity="0.85">
    <path d="M-90 -14 h130 a26 26 0 0 1 26 26 v0 a26 26 0 0 1 -26 26 h-130 a14 14 0 0 1 -14 -14 v-24 a14 14 0 0 1 14 -14 z"/>
    <circle cx="72" cy="12" r="18" fill="#E6F2FB"/>
  </g>

  <text x="400" y="560" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0663A3" font-weight="600" opacity="0.85">
    Sostituire con foto reale
  </text>
</svg>
